<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LectraNote - Study History</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-brain"></i> Lectra<span>Note</span>
            </div>
            <ul class="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="index.html">Upload Lecture</a></li>
                <li><a href="flashcards.html">Flashcards</a></li>
                <li><a href="quiz.html">Quiz Mode</a></li>
                <li><a href="history.html" class="active">History</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <button onclick="goBack()" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <h1><i class="fa-solid fa-clock-rotate-left"></i> Study History</h1>
            <p>Review your previous lectures and study materials</p>
        </div>

        <!-- No History State -->
        <div id="noHistoryState" class="empty-state">
            <i class="fa-solid fa-folder-open"></i>
            <h3>No History Yet</h3>
            <p>Your lecture history will appear here after you upload and process lectures</p>
            <a href="index.html" class="btn btn-primary">
                <i class="fa-solid fa-upload"></i> Upload First Lecture
            </a>
        </div>

        <!-- Current Lecture -->
        <div id="currentLectureSection" class="hidden">
            <div class="section-header">
                <h2><i class="fa-solid fa-star"></i> Current Lecture</h2>
                <button onclick="clearCurrentLecture()" class="btn-icon danger">
                    <i class="fa-solid fa-trash"></i> Clear
                </button>
            </div>
            <div id="currentLectureCard" class="history-card current">
                <!-- Current lecture details will be inserted here -->
            </div>
        </div>

        <!-- History List -->
        <div id="historySection" class="hidden">
            <div class="section-header">
                <h2><i class="fa-solid fa-history"></i> Previous Lectures</h2>
                <button onclick="clearAllHistory()" class="btn-icon danger">
                    <i class="fa-solid fa-trash-can"></i> Clear All History
                </button>
            </div>
            <div id="historyList">
                <!-- History items will be inserted here -->
            </div>
        </div>
    </div>

    <script src="js/history.js"></script>
</body>
</html>
